services:
  rootseducationhub:
    build: .
    container_name: rootseducationhub
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:./data/dev.db"
      SEED_DEMO_USER_EMAIL: "student@roots.edu"
      SEED_DEMO_USER_PASSWORD: "password123"
      SEED_ADMIN_EMAIL: "admin@roots.edu"
      SEED_ADMIN_PASSWORD: "admin123"
      SEED_TEACHER_EMAIL: "teacher@roots.edu"
      SEED_TEACHER_PASSWORD: "teacher123"
    volumes:
      - roots_data:/app/data
    restart: unless-stopped

volumes:
  roots_data:
